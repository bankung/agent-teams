# Infisical secrets backend — OPTIONAL overlay (Kanban #2488, Phase 1, DRAFT v2).
# Opt-in only: include this file AND pass --profile secrets.
#
#   With Infisical:    docker compose -p agent-teams -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.secrets.yml --profile secrets up -d --build
#   Without (default): docker compose -p agent-teams -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Decisions locked 2026-06-22 (#2488 §0): own PG, host port 6080, pin v0.161.3,
# telemetry off, SOFT-fallback (api does NOT hard-depend on Infisical).
#
# v2 reconciled against Infisical's official docker-compose.prod.yml (fetched 2026-06-22):
#   - Infisical defines NO backend healthcheck -> we omit one too (api doesn't depend on it).
#   - Official isolates services on an `infisical` network + uses env_file:.env with NATIVE names.
#     We deliberately do NOT isolate: api must reach `infisical-backend` by name on the DEFAULT
#     compose network. We map our INFISICAL_*-prefixed .env vars to Infisical's native names
#     inline, so ONE shared agent-teams .env serves both without name collisions.
# DRAFT — dev-devops to harden (see APPLY-phase1.md open points).

services:
  infisical-db:
    image: postgres:14-alpine          # matches Infisical official; isolated from our pg16 `db`
    container_name: agent-teams-infisical-db
    profiles: ["secrets"]
    environment:
      POSTGRES_USER: ${INFISICAL_POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${INFISICAL_POSTGRES_PASSWORD:?set INFISICAL_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${INFISICAL_POSTGRES_DB:-infisical}
    volumes:
      - infisical-pgdata:/var/lib/postgresql/data   # CRITICAL — all encrypted secrets. Back up WITH the master keys (§0.3).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INFISICAL_POSTGRES_USER:-infisical} -d ${INFISICAL_POSTGRES_DB:-infisical}"]
      interval: 5s
      timeout: 10s
      retries: 10
    # internal-only — NO host port (our db owns 5432)

  infisical-redis:
    image: redis:7-alpine              # official uses untagged `redis`; pinned here. Cache/queue only.
    container_name: agent-teams-infisical-redis
    profiles: ["secrets"]
    command: ["redis-server", "--save", ""]   # no persistence — regenerable (official keeps redis_data; not needed single-host)
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  infisical-backend:
    image: infisical/infisical:v0.161.3   # PINNED (Docker Hub latest stable 2026-06-22). Back up infisical-pgdata BEFORE bumping.
    container_name: agent-teams-infisical
    profiles: ["secrets"]
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Ground truth (official .env.example + compose lack HOST yet work) => the image binds 0.0.0.0
      # in-container by default. Set explicitly as harmless insurance (NOT a blocker, per Lead verify).
      HOST: "0.0.0.0"
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:?set INFISICAL_ENCRYPTION_KEY in .env (openssl rand -hex 16)}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:?set INFISICAL_AUTH_SECRET in .env (openssl rand -base64 32)}
      DB_CONNECTION_URI: postgres://${INFISICAL_POSTGRES_USER:-infisical}:${INFISICAL_POSTGRES_PASSWORD:?set INFISICAL_POSTGRES_PASSWORD in .env}@infisical-db:5432/${INFISICAL_POSTGRES_DB:-infisical}
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:6080}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:${INFISICAL_PORT:-6080}:8080"   # 6xxx; localhost-bound like our api
    # NOTE: Infisical's official compose defines NO backend healthcheck; we omit one too.
    # api does NOT depend on this service (soft-fallback, §0.4) so it is non-essential. Add one
    # only after verifying the v0.161.3 health path.

  # --- our api: pass Infisical env + wrap command with the soft-fallback entrypoint ---
  # api has NO depends_on infisical-backend (decision §0.4: soft-fallback / no hard-fail).
  # The entrypoint probes the self-hosted Infisical (INFISICAL_DOMAIN) and falls back to .env
  # when absent/unreachable. CLI is baked via build-arg -> first use needs --build.
  api:
    build:
      args:
        INSTALL_INFISICAL_CLI: "true"
    environment:
      # These must reach the container so the entrypoint can call the self-hosted Infisical.
      # Empty INFISICAL_TOKEN -> entrypoint takes the plain-.env path (default).
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      # Self-host target (Lead-verified 2026-06-23 via cli/usage docs): INFISICAL_DOMAIN is the
      # current env-var name (legacy INFISICAL_API_URL still honored); no /api suffix. The
      # entrypoint also passes --domain explicitly (highest precedence). `infisical-backend`
      # resolves from api on the default network.
      INFISICAL_DOMAIN: ${INFISICAL_DOMAIN:-http://infisical-backend:8080}
      INFISICAL_DISABLE_UPDATE_CHECK: "true"   # skip the CLI's per-run outbound update check
    command: ["sh", "/repo/api/bin/infisical-entrypoint.sh"]

volumes:
  infisical-pgdata:
