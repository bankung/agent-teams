# Alembic configuration for agent-teams API.
# Connection URL is loaded from env (DATABASE_URL) inside alembic/env.py — do not hardcode here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Format migration filenames as <YYYY_MM_DD_HHMM>_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC

# sqlalchemy.url is intentionally blank — env.py reads DATABASE_URL from environment.
sqlalchemy.url =

[post_write_hooks]
# (none — keep migrations pristine)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
