# Base compose for agent-teams (db + api + web + langgraph).
# This file is the common base — apply an overlay for your mode:
#
#   Dev mode (hot-reload):   docker compose -p agent-teams -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Lightweight/prod mode:   docker compose -p agent-teams -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   Back to dev mode:        docker compose -p agent-teams -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# First-time install: use ./bin/install.sh (Linux/Mac) or .\bin\install.ps1 (Windows).
# Manual flow for developers: see readme_dev.md "Live migration procedure".
#
# Reset (DEV ONLY — wipes DB):
#   docker compose down -v

services:
  db:
    image: postgres:16-alpine
    container_name: agent-teams-db-latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: agent_teams
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agent-teams-pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=20", "-c", "shared_buffers=32MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_teams"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: agent-teams-api-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the api talks to the `db` service by hostname,
      # NOT localhost. The .env DATABASE_URL is for running uvicorn locally
      # against the same compose db (host = localhost).
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/agent_teams
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      # The whole repo is bind-mounted at /repo so the project auto-scaffold
      # can write context/projects/<name>/ from inside the container.
      REPO_ROOT: /repo
      # LLM provider config for POST /api/tasks/ai-parse (Kanban #856). Shared
      # contract with the langgraph service below — same env vars so ops sets
      # provider + keys ONCE for the whole stack. api scope is anthropic +
      # openai only (ollama is langgraph-only in this release; the parser
      # rejects ollama with 503).
      LANGGRAPH_LLM_PROVIDER: ${LANGGRAPH_LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Off-site encrypted backup (Kanban #959). Disabled-by-default — runner
      # logs warning + skips scheduling when any of the 4 required keys
      # (BUCKET / ACCESS_KEY / SECRET / AGE_PUBKEY) is empty. Operator's
      # private age key MUST stay offline (USB / password manager); only the
      # public key lands here.
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_AGE_PUBKEY: ${BACKUP_AGE_PUBKEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-agent-teams/}
      # Kanban #1437 — signed-token opt-out for digest emails (itsdangerous).
      # MUST be set to a random 32+ char string in production .env.
      # Dev default is intentionally weak — token links still work but are
      # not secret; operator should rotate before exposing the API publicly.
      SECRET_KEY: ${SECRET_KEY:-dev-secret-NOT-FOR-PROD-change-in-dotenv}
      GMAIL_SMTP_HOST: ${GMAIL_SMTP_HOST:-smtp.gmail.com}
      GMAIL_SMTP_PORT: ${GMAIL_SMTP_PORT:-587}
      GMAIL_SMTP_USER: ${GMAIL_SMTP_USER:-}
      GMAIL_SMTP_APP_PASSWORD: ${GMAIL_SMTP_APP_PASSWORD:-}
      GMAIL_SMTP_FROM: ${GMAIL_SMTP_FROM:-}
      DIGEST_EMAIL_RECIPIENT: ${DIGEST_EMAIL_RECIPIENT:-}
      DIGEST_EMAIL_ENABLED: ${DIGEST_EMAIL_ENABLED:-false}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:5431}
      # Kanban #1192 — ntfy push-notification channel.
      # Operator sets NTFY_TOPIC + PUSH_ENABLED=true in .env to enable.
      # NTFY_ACCESS_TOKEN is optional (only needed if ntfy topic is auth-protected).
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_ACCESS_TOKEN: ${NTFY_ACCESS_TOKEN:-}
      PUSH_ENABLED: ${PUSH_ENABLED:-false}
      BACKUP_CRON_RULE: ${BACKUP_CRON_RULE:-0 3 * * *}
      BACKUP_TIMEZONE: ${BACKUP_TIMEZONE:-UTC}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-30}
      BACKUP_KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-12}
      BACKUP_DRY_RUN: ${BACKUP_DRY_RUN:-false}
      # Health monitor (Kanban #960). Enabled-by-default; set
      # HEALTH_MONITOR_DISABLED=1 to opt out.
      HEALTH_MONITOR_DISABLED: ${HEALTH_MONITOR_DISABLED:-}
      HEALTH_MONITOR_INTERVAL_MINUTES: ${HEALTH_MONITOR_INTERVAL_MINUTES:-15}
      HEALTH_MONITOR_API_BASE: ${HEALTH_MONITOR_API_BASE:-http://localhost:8456}
      # Kanban #955.A — Web Push (VAPID) keys for the notify_web_push.py adapter.
      # Operator generates a fresh keypair ONCE via api/scripts/generate_vapid_keys.py
      # and pastes the output into .env (NEVER commit the private key). Default
      # empty so an unconfigured deployment surfaces `missing_env_VAPID_*` from
      # the adapter and the router falls through cleanly (same posture as
      # TELEGRAM_BOT_TOKEN). Subject is `mailto:...` or `https://...` (RFC 8292).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      # pytest_runner role password (Kanban #1109 — L4 prevention layer for
      # the 2026-05-17 dev-DB-wipe incident). Used by the alembic migration
      # 0034_pytest_runner_role to create the role with the matching password,
      # AND by api/tests/conftest.py to bind pytest connections to the
      # constrained role. The dev default keeps `docker compose up` working
      # on a fresh checkout; production deployments MUST set
      # PYTEST_DB_PASSWORD in .env (the value lives only in the role's
      # password — no other side effect, safe to rotate via re-running the
      # migration).
      PYTEST_DB_PASSWORD: ${PYTEST_DB_PASSWORD:-pytest_runner_dev_only_NOT_FOR_PROD}
      # Kanban #1326 (M3) — credentials vault Fernet master key. Required at
      # api startup; the lifespan calls get_fernet() and refuses to start if
      # the var is missing or malformed. No default — the operator MUST
      # generate a fresh key per deployment and set it in .env. See
      # _scratch/standards-draft-credentials-rotation.md for rotation procedure.
      CREDENTIALS_MASTER_KEY: ${CREDENTIALS_MASTER_KEY:-}
      # Email tools — Gmail + Outlook OAuth (Kanban #1604/#1608 wired via #1626).
      # os.environ passthrough: gmail_client.py / outlook_client.py / gate.py read
      # these directly; no load_dotenv() in the container — values must land here.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8456/api/tools/email/auth/gmail/callback}
      EMAIL_TOOLS_DAILY_UNITS_CAP: ${EMAIL_TOOLS_DAILY_UNITS_CAP:-5000}
      EMAIL_TOOLS_BULK_THRESHOLD: ${EMAIL_TOOLS_BULK_THRESHOLD:-100}
      EMAIL_TOOLS_AUDIT_PATH: ${EMAIL_TOOLS_AUDIT_PATH:-/repo/_scratch/email-tools-audit.jsonl}
      AZURE_OAUTH_CLIENT_ID: ${AZURE_OAUTH_CLIENT_ID:-}
      AZURE_OAUTH_CLIENT_SECRET: ${AZURE_OAUTH_CLIENT_SECRET:-}
      AZURE_OAUTH_TENANT: ${AZURE_OAUTH_TENANT:-consumers}
      AZURE_OAUTH_REDIRECT_URI: ${AZURE_OAUTH_REDIRECT_URI:-http://localhost:8456/api/tools/email/auth/outlook/callback}
    ports:
      - "${API_PORT:-8456}:8456"
    volumes:
      # Bind the repo root read-write. Working dir inside the container is
      # /repo/api (set by Dockerfile WORKDIR). The mount overlays the build-time
      # COPY so source edits take effect under --reload.
      - .:/repo
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8456", "--reload"]
    healthcheck:
      # /health is a liveness probe (no DB touch — see standards/fastapi/runtime.md).
      # curl is installed in api/Dockerfile specifically for this check.
      # start_period gives uvicorn time to import + bind before failures count.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8456/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # web — Phase 3 Next.js Kanban UI (dev image only).
  # Production multi-stage Dockerfile is deferred to a later slice.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agent-teams-web-latest
    depends_on:
      api:
        condition: service_healthy
    environment:
      # NEXT_PUBLIC_* vars are inlined into the client bundle by Next.js at build time —
      # safe for non-secret URLs only. The browser runs on the host, so use the host-resolvable
      # URL (`http://localhost:8456`) — the compose-internal `api` hostname is NOT browser-resolvable.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8456}
      # SSR / Server Component fetches inside the web container resolve `api` via the
      # compose network. web/lib/api.ts:apiBaseUrl() picks SERVER_API_URL when
      # typeof window === 'undefined'. Without this var SSR fetches localhost:8456,
      # which only works on Windows / macOS Docker Desktop (gateway routing) —
      # breaks on Linux compose where container localhost != host. (Kanban #704)
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8456}
      # Kanban #955.C — VAPID public key for Web Push (mirrors the api service's
      # VAPID_PUBLIC_KEY). Inlined into the browser bundle as NEXT_PUBLIC_* so
      # web/lib/push.ts can call PushManager.subscribe({ applicationServerKey }).
      # Public half is safe to ship to the browser; the PRIVATE half stays in
      # the api service only. Empty default = Push subscribe surfaces a clear
      # "missing VAPID key" message in the settings UI.
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      # Kanban #1392 — operator-opt-in personal-use feature; default off for pilot installs.
      NEXT_PUBLIC_FINANCE_PANELS_ENABLED: ${NEXT_PUBLIC_FINANCE_PANELS_ENABLED:-false}
    ports:
      - "${WEB_PORT:-5431}:5431"
    healthcheck:
      # Next dev mode takes ~5-10s for first-request compile; start_period covers it.
      # wget is in alpine base by default; if not, swap to `node -e "require('http').get('http://localhost:5431', r => process.exit(r.statusCode === 200 ? 0 : 1))"`.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5431 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # langgraph — Phase 4 LangGraph engine (Kanban #849/#851).
  # Headless graph runner; shares the existing `db` service via an isolated
  # `langgraph` schema (created at startup by the graph app — see #850).
  # Stub graph in graph.py until #850 lands; CMD will switch to a langgraph
  # server invocation once the real StateGraph is defined.
  # ---------------------------------------------------------------------------
  langgraph:
    profiles: ["langgraph"]
    build:
      context: ./langgraph
      dockerfile: Dockerfile
    container_name: agent-teams-langgraph-latest
    depends_on:
      db:
        condition: service_healthy
      # Kanban #852 — the langgraph worker polls the api service immediately on
      # startup. Without this dep langgraph can win the start race, fail its
      # first GET /api/tasks/next-autorun, log + idle-sleep, and recover only on
      # the next poll. Cheap to add; cleaner first-tick logs.
      api:
        condition: service_healthy
    environment:
      # Inside the compose network the hostname is `db` (not localhost). The
      # ?options=-c%20search_path=langgraph URL-encodes a SET search_path so
      # the connection lands in the langgraph schema by default. The schema
      # itself is CREATEd at startup by the graph app (#850) before
      # AsyncPostgresSaver.setup() runs (Option B in the bootstrap research).
      DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/agent_teams?options=-c%20search_path=langgraph
      LANGGRAPH_LLM_PROVIDER: ${LANGGRAPH_LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # Kanban #891 — Ollama provider (free local LLM). Only consulted when
      # LANGGRAPH_LLM_PROVIDER=ollama. host.docker.internal reaches the host's
      # Ollama process on Mac + Win Docker Desktop; on Linux compose, add
      # `extra_hosts: ["host.docker.internal:host-gateway"]` to this service.
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Kanban #2120 — explicit context window for ChatOllama; Ollama server
      # default (~4 K) silently truncates multi-turn tool-calling conversations.
      LANGGRAPH_OLLAMA_NUM_CTX: ${LANGGRAPH_OLLAMA_NUM_CTX:-32768}
      # Kanban #1951 — Google / Gemini native provider. Only consulted when
      # LANGGRAPH_LLM_PROVIDER=google. Uses langchain-google-genai (native SDK)
      # which handles thought_signature correctly for multi-turn tool-calling.
      # gemini-flash-latest has quota; gemini-2.0-flash has quota=0.
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-flash-latest}
      # Kanban #852/#2184 — background worker config. The worker polls the api
      # service (compose-internal hostname `api`, port 8456).
      # empty = multi-board (DB-driven discovery of consented+tools-enabled
      # projects, #2184); set = single-board pin to that project id.
      LANGGRAPH_PROJECT_ID: ${LANGGRAPH_PROJECT_ID:-}
      # #2135 — enables #1886 usage metering; empty = reporting disabled;
      # Lead pins a persistent session id in .env.
      LANGGRAPH_SESSION_ID: ${LANGGRAPH_SESSION_ID:-}
      LANGGRAPH_POLL_INTERVAL_SEC: ${LANGGRAPH_POLL_INTERVAL_SEC:-30}
      LANGGRAPH_KANBAN_API_BASE: ${LANGGRAPH_KANBAN_API_BASE:-http://api:8456}
      # Kanban #1717 — tool-use loop conversation-history compaction budget
      # (deterministic; older tool-result payloads stubbed/dropped to fit).
      LANGGRAPH_CONTEXT_TOKEN_BUDGET: ${LANGGRAPH_CONTEXT_TOKEN_BUDGET:-60000}
      # Kanban #1107 — WARN-2 fix. HITL_DEMO_ENABLED=1 unlocks the
      # `HITL demo —` title-prefix branch in langgraph/nodes.py:general_node.
      # Dev default 1 so #1073 smoke + onboarding demos keep working. PRODUCTION
      # deployments MUST leave this unset (CWE-489 / OWASP A05 — any
      # authenticated user with task-create permission could otherwise trigger
      # the hardcoded interrupt branch).
      HITL_DEMO_ENABLED: ${HITL_DEMO_ENABLED:-1}
      REPO_ROOT: /repo
    ports:
      - "${LANGGRAPH_PORT:-8465}:8000"
    volumes:
      # Bind repo root rw so #850's code edits hot-reload during dev (same
      # pattern as the api service). For prod, bake the graph into the image
      # via `langgraph build` and drop this mount.
      - .:/repo
    restart: unless-stopped
    healthcheck:
      # python -c (not curl) — the langgraph image is python:3.12-slim and
      # does not include curl.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ok')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  agent-teams-pgdata:
