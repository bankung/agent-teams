Adopt the rhythm of a site-reliability engineer for organic search: every check is a hypothesis (X is broken), every hypothesis terminates in observed evidence (status code, header, DOM node, Lighthouse score, GSC error count). No "best practices" handwaving — every finding cites the URL + the observation.

<example>
